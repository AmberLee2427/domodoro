<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08070d">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Domodoro</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08070d;
      --panel: #15111f;
      --panel-soft: #1d1728;
      --line: #3a2d4e;
      --gold: #e6c66f;
      --rose: #e15f72;
      --mint: #63d9b4;
      --text: #f7f0ff;
      --muted: #a99db9;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100svh;
      margin: 0;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 20% 0%, rgba(225, 95, 114, 0.18), transparent 34%),
        radial-gradient(circle at 92% 10%, rgba(230, 198, 111, 0.16), transparent 30%),
        var(--bg);
      color: var(--text);
      font: 15px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: var(--gold);
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 14px rgba(99, 217, 180, 0.8);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 17, 31, 0.94);
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .timer-panel {
      text-align: center;
      border-color: rgba(230, 198, 111, 0.45);
      background: linear-gradient(180deg, rgba(33, 27, 44, 0.98), rgba(16, 12, 23, 0.98));
    }

    #mode-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    #timer-display {
      margin: 8px 0 14px;
      font-size: clamp(56px, 19vw, 86px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 750;
    }

    .duration-grid,
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      grid-template-columns: 1.25fr 1fr 1fr;
      margin-top: 12px;
    }

    .chat-actions {
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea,
    input {
      width: 100%;
      min-height: 42px;
      margin: 0 0 10px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      outline: none;
      font: inherit;
    }

    textarea:focus,
    input:focus {
      border-color: rgba(230, 198, 111, 0.78);
      box-shadow: 0 0 0 2px rgba(230, 198, 111, 0.12);
    }

    button {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(230, 198, 111, 0.38);
      border-radius: 6px;
      background: rgba(230, 198, 111, 0.13);
      color: var(--text);
      cursor: pointer;
      font-weight: 750;
      font: inherit;
    }

    button.primary {
      border-color: transparent;
      background: var(--rose);
      color: #fff;
    }

    button:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    .avatar-row {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 14px;
      align-items: center;
    }

    .avatar-preview {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 2px solid rgba(230, 198, 111, 0.72);
      object-fit: cover;
      background: #09070d;
    }

    #chat-box {
      height: 150px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #07050b;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    #model-status {
      min-height: 20px;
      margin: 8px 0;
      color: var(--gold);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Domodoro</h1>
      <div class="status-pill"><span class="dot"></span><span id="active-label">Ready</span></div>
    </header>

    <section class="panel timer-panel">
      <div id="mode-label">Focus Session</div>
      <div id="timer-display">25:00</div>
      <div class="duration-grid">
        <div>
          <label for="work-minutes">Focus</label>
          <input id="work-minutes" type="number" min="1" max="180" step="1" value="25">
        </div>
        <div>
          <label for="break-minutes">Break</label>
          <input id="break-minutes" type="number" min="1" max="180" step="1" value="5">
        </div>
      </div>
      <div class="actions">
        <button id="start-btn" class="primary">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="reset-btn">Reset</button>
      </div>
    </section>

    <section class="panel">
      <div class="avatar-row">
        <img id="avatar-img" class="avatar-preview" src="../suit.png" alt="Domodoro avatar">
        <div>
          <label for="persona-input">Persona Instructions</label>
          <textarea id="persona-input" rows="3">An overbearing, possessive mafia boss who calls me trouble.</textarea>
        </div>
      </div>
    </section>

    <section class="panel">
      <div id="chat-box"></div>
      <input type="text" id="chat-input" placeholder="Talk back...">
      <div id="model-status">Gemma is asleep.</div>
      <div class="actions chat-actions">
        <button id="warm-btn">Warm Gemma</button>
        <button id="send-btn" class="primary">Send</button>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
