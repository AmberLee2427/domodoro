<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08070d;
      --panel: #15111f;
      --panel-soft: #1d1728;
      --line: #3a2d4e;
      --gold: #e6c66f;
      --rose: #e15f72;
      --mint: #63d9b4;
      --text: #f7f0ff;
      --muted: #a99db9;
    }

    * { box-sizing: border-box; }

    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      background:
        radial-gradient(circle at 20% 0%, rgba(225, 95, 114, 0.16), transparent 32%),
        radial-gradient(circle at 90% 12%, rgba(230, 198, 111, 0.14), transparent 28%),
        var(--bg);
      color: var(--text);
      font: 13px/1.35 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      color: var(--gold);
      font-family: Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 12px rgba(99, 217, 180, 0.75);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 17, 31, 0.94);
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .timer-panel {
      text-align: center;
      border-color: rgba(230, 198, 111, 0.45);
      background: linear-gradient(180deg, rgba(33, 27, 44, 0.98), rgba(16, 12, 23, 0.98));
    }

    #mode-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    #timer-display {
      margin: 6px 0 10px;
      color: var(--text);
      font-size: 52px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .timer-actions,
    .chat-actions,
    .duration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .timer-actions {
      grid-template-columns: 1.3fr 1fr 1fr;
      margin-top: 10px;
    }

    .chat-actions {
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea,
    select,
    input {
      width: 100%;
      min-height: 34px;
      margin: 0 0 8px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      outline: none;
    }

    textarea:focus,
    select:focus,
    input:focus {
      border-color: rgba(230, 198, 111, 0.78);
      box-shadow: 0 0 0 2px rgba(230, 198, 111, 0.12);
    }

    input[type="checkbox"] {
      width: auto;
      min-height: 0;
      margin: 0 8px 0 0;
      accent-color: var(--rose);
    }

    button {
      width: 100%;
      min-height: 34px;
      border: 1px solid rgba(230, 198, 111, 0.38);
      border-radius: 6px;
      background: rgba(230, 198, 111, 0.13);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      border-color: transparent;
      background: var(--rose);
      color: #fff;
    }

    button:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.58; cursor: wait; filter: none; }

    #model-status {
      min-height: 18px;
      margin: 8px 0;
      color: var(--gold);
      font-size: 12px;
    }

    #chat-box {
      height: 108px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #07050b;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .avatar-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: center;
    }

    .avatar-preview {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(230, 198, 111, 0.72);
      object-fit: cover;
      background: #09070d;
    }
  </style>
</head>
<body>
  <header>
    <h1>Domodoro</h1>
    <div class="status-pill"><span class="dot"></span><span id="active-label">Active</span></div>
  </header>

  <section class="panel timer-panel">
    <div id="mode-label">Focus Session</div>
    <div id="timer-display">25:00</div>
    <div class="duration-grid">
      <div>
        <label for="work-minutes">Focus</label>
        <input id="work-minutes" type="number" min="1" max="180" step="1">
      </div>
      <div>
        <label for="break-minutes">Break</label>
        <input id="break-minutes" type="number" min="1" max="180" step="1">
      </div>
    </div>
    <div class="timer-actions">
      <button id="start-btn" class="primary">Start</button>
      <button id="pause-btn">Pause</button>
      <button id="reset-btn">Reset</button>
    </div>
  </section>

  <section class="panel">
    <label><input type="checkbox" id="active-toggle" checked> Monitoring Active</label>
    <div class="avatar-row">
      <img id="avatar-img" class="avatar-preview" src="suit.png">
      <div>
        <label for="outfit-select">Current Outfit</label>
        <select id="outfit-select">
          <option value="suit">Tailored Black Suit</option>
          <option value="casual">Rolled Sleeves & Tattoos</option>
          <option value="maid">Maid Outfit</option>
        </select>
        <input type="file" id="avatar-upload" accept="image/*">
      </div>
    </div>
  </section>

  <section class="panel">
    <label for="persona-input">Persona Instructions</label>
    <textarea id="persona-input" rows="2">An overbearing, possessive mafia boss who calls me trouble.</textarea>
  </section>

  <section class="panel">
    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Talk back...">
    <div id="model-status"></div>
    <div class="chat-actions">
      <button id="warm-btn">Warm Gemma</button>
      <button id="send-btn" class="primary">Send</button>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
