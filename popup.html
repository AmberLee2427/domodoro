<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f1f5;
      --paper-deep: #eee4ed;
      --panel: #fffafc;
      --lavender: #cdb8df;
      --lavender-deep: #8c72ad;
      --ink: #3f3846;
      --muted: #7f7488;
      --line: #bcaacb;
      --shadow: rgba(83, 62, 103, 0.2);
      --heart: #b58bd4;
    }

    * { box-sizing: border-box; }

    body {
      width: 386px;
      margin: 0;
      padding: 14px;
      background:
        linear-gradient(rgba(140, 114, 173, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 114, 173, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 86% 7%, rgba(205, 184, 223, 0.55), transparent 28%),
        var(--paper);
      background-size: 18px 18px, 18px 18px, auto;
      color: var(--ink);
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-mark {
      position: relative;
      width: 16px;
      height: 32px;
      border: 3px solid var(--lavender-deep);
      border-radius: 999px;
      transform: rotate(3deg);
      opacity: 0.9;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 5px;
      width: 8px;
      height: 22px;
      border: 2px solid var(--lavender);
      border-radius: 999px;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 31px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--lavender-deep);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--heart);
      box-shadow: 0 0 10px rgba(181, 139, 212, 0.65);
    }

    .panel {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(255, 250, 252, 0.88);
      padding: 12px;
      margin-bottom: 11px;
      box-shadow: 3px 4px 0 rgba(140, 114, 173, 0.15);
    }

    .timer-panel {
      text-align: center;
      overflow: hidden;
      border-color: var(--lavender-deep);
      background: linear-gradient(180deg, #fffafd, #f3eaf4);
      min-height: 190px;
      padding-right: 156px;
    }

    .timer-panel::before,
    .panel::before {
      content: attr(data-title);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      padding: 3px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--lavender);
      color: var(--ink);
      font-weight: 700;
      text-align: left;
      font-size: 11px;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .timer-panel > * {
      position: relative;
      z-index: 2;
    }

    .timer-panel {
      padding-top: 34px;
    }

    .panel:not(.timer-panel) {
      padding-top: 31px;
    }

    .character-standee {
      position: absolute;
      right: 6px;
      bottom: -10px;
      width: 138px;
      height: 196px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 10px 10px rgba(52, 38, 65, 0.22));
      z-index: 1;
    }

    .timer-content {
      max-width: 250px;
    }

    #mode-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    #timer-display {
      margin: 6px 0 10px;
      color: var(--ink);
      font-size: 56px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
    }

    .timer-actions,
    .chat-actions,
    .duration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .timer-actions {
      grid-template-columns: 1.3fr 1fr 1fr;
      margin-top: 10px;
    }

    .chat-actions {
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea,
    select,
    input {
      width: 100%;
      min-height: 34px;
      margin: 0 0 8px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      outline: none;
      font: inherit;
    }

    textarea:focus,
    select:focus,
    input:focus {
      border-color: var(--lavender-deep);
      box-shadow: 0 0 0 2px rgba(205, 184, 223, 0.35);
    }

    input[type="checkbox"] {
      width: auto;
      min-height: 0;
      margin: 0 8px 0 0;
      accent-color: var(--lavender-deep);
    }

    button {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: linear-gradient(#fffafd, #e7d8ec);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
      font: inherit;
      box-shadow: 1px 1px 0 #fff inset, 1px 1px 0 rgba(83, 62, 103, 0.2);
    }

    button.primary {
      border-color: var(--lavender-deep);
      background: linear-gradient(#d9c2e8, #b99ed2);
      color: var(--ink);
    }

    button:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.58; cursor: wait; filter: none; }

    #model-status {
      min-height: 18px;
      margin: 8px 0;
      color: var(--lavender-deep);
      font-size: 12px;
    }

    #chat-box {
      height: 108px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.58);
      padding: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    #blacklist-input {
      min-height: 92px;
      resize: vertical;
    }

    .outfit-panel {
      padding-bottom: 9px;
    }

    .progress-track {
      height: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      margin-top: 10px;
      padding: 2px;
    }

    #outfit-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--lavender), var(--heart));
    }

    .progress-copy {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .postit {
      background: #fff8df;
      border-color: #d6c7a6;
      transform: rotate(-1deg);
      box-shadow: 4px 6px 0 rgba(140, 114, 173, 0.13);
    }

    .postit::before {
      content: "Context Note";
      background: #eadfc3;
      border-color: #d6c7a6;
    }

    #todo-input {
      min-height: 118px;
      background:
        linear-gradient(transparent 31px, rgba(214, 199, 166, 0.5) 32px),
        rgba(255, 252, 237, 0.9);
      background-size: 100% 32px;
      line-height: 32px;
      resize: vertical;
    }

    .outfit-chart {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
    }

    .chat-line {
      margin-bottom: 6px;
    }

    .chat-line.dom {
      color: var(--lavender-deep);
    }

    .chat-line.system {
      color: var(--muted);
    }

    .chat-line.tool {
      color: var(--lavender-deep);
      font-style: italic;
    }

    .avatar-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
    }

    .avatar-preview {
      width: 72px;
      height: 96px;
      border-radius: 0;
      border: 1px solid var(--line);
      object-fit: contain;
      object-position: center;
      background: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="brand-mark"></span><h1>Domodoro</h1></div>
    <div class="status-pill"><span class="dot"></span><span id="active-label">Active</span></div>
  </header>

  <section class="panel timer-panel" data-title="Focus Console">
    <img id="character-standee" class="character-standee" src="assets/characters/default/default.png" alt="">
    <div class="timer-content">
      <div id="mode-label">Focus Session</div>
      <div id="timer-display">25:00</div>
      <div class="duration-grid">
        <div>
          <label for="work-minutes">Focus</label>
          <input id="work-minutes" type="number" min="1" max="180" step="1">
        </div>
        <div>
          <label for="break-minutes">Break</label>
          <input id="break-minutes" type="number" min="1" max="180" step="1">
        </div>
      </div>
      <div class="timer-actions">
        <button id="start-btn" class="primary">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
  </section>

  <section class="panel" data-title="Monitoring & Outfit">
    <label><input type="checkbox" id="active-toggle" checked> Monitoring Active</label>
    <div class="avatar-row">
      <img id="avatar-img" class="avatar-preview" src="assets/characters/default/headshot.png">
      <div>
        <label for="outfit-select">Character</label>
        <select id="outfit-select">
          <option value="default">Default</option>
          <option value="silk">Silk & Surrender</option>
          <option value="director">Obsidian Director</option>
          <option value="chrome">Chrome Protocol</option>
          <option value="king">Productivity King</option>
        </select>
      </div>
    </div>
  </section>

  <section class="panel" data-title="Persona">
    <label for="persona-input">Persona Instructions</label>
    <textarea id="persona-input" rows="2">An overbearing, possessive shadow daddy who calls me trouble.</textarea>
  </section>

  <section class="panel postit" data-title="Context Note">
    <label for="todo-input">Today's Terms</label>
    <textarea id="todo-input" rows="2" placeholder="- Finish the thing&#10;- Drink water&#10;- No tab wandering"></textarea>
  </section>

  <section class="panel" data-title="Site Discipline">
    <label><input type="checkbox" id="blacklist-toggle" checked> Interrupt forbidden sites</label>
    <label><input type="checkbox" id="voice-toggle" checked> Speak timer and site interrupts</label>
    <label for="blacklist-input">Blacklist</label>
    <textarea id="blacklist-input" spellcheck="false" placeholder="youtube.com&#10;reddit.com&#10;x.com"></textarea>
  </section>

  <section class="panel" data-title="Dom Channel">
    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Talk back...">
    <div id="model-status"></div>
    <div class="chat-actions">
      <button id="warm-btn">Summon Dom</button>
      <button id="voice-input-btn" type="button">Dictate</button>
      <button id="purge-cache-btn">Purge Cache</button>
      <button id="send-btn" class="primary">Send</button>
    </div>
  </section>

  <section class="panel outfit-panel" data-title="Outfit Rewards">
    <img class="outfit-chart" src="assets/outfits.png" alt="Domodoro outfit unlock rewards">
    <div class="progress-track" aria-hidden="true">
      <div id="outfit-progress-bar"></div>
    </div>
    <div class="progress-copy">
      <span id="outfit-progress-label">0 sessions</span>
      <span id="outfit-next-unlock">Next: Default at 0</span>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
